<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的工具集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.8);
            margin-bottom: 40px;
        }
        
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .tool-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            display: block;
        }
        
        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
        }
        
        .tool-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .tool-name {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        
        .tool-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
        }
        
        .loading {
            text-align: center;
            color: white;
            padding: 60px;
            font-size: 18px;
        }
        
        .empty {
            text-align: center;
            color: white;
            padding: 60px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠️ 我的工具集</h1>
        <div class="subtitle">点击卡片访问对应工具</div>
        
        <div id="tool-list" class="tool-grid">
            <div class="loading">正在加载工具列表...</div>
        </div>
        <div class="footer">
            GitHub Pages 自动生成 | 添加新文件夹即可自动显示
        </div>
    </div>
    
    <script>
        // 配置：排除这些文件夹（不显示在导航页）
        const EXCLUDE_FOLDERS = ['assets', 'images', 'css', 'js', '.github'];
        
        // 工具名称映射（根据文件夹名自动生成友好的显示名称）
        function formatToolName(folderName) {
            return folderName
                .replace(/-/g, ' ')
                .replace(/_/g, ' ')
                .split(' ')
                .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                .join(' ');
        }
        
        // 工具描述映射（可选，也可以自动生成）
        function getToolDescription(folderName) {
            const descriptions = {
                'industry-chain': '产业链图智能生成器，支持AI生成和手动编辑',
                'internet-addiction-website': '网瘾科普与干预指南网站'
            };
            return descriptions[folderName] || `${formatToolName(folderName)} - 点击访问`;
        }
        
        // 工具图标映射
        function getToolIcon(folderName) {
            const icons = {
                'industry-chain': '🏭',
                'internet-addiction-website': '📱'
            };
            return icons[folderName] || '🔧';
        }
        
        async function loadTools() {
            const container = document.getElementById('tool-list');
            
            try {
                // 获取当前仓库的文件夹列表
                // 注意：这个方法需要 GitHub API，且可能有跨域限制
                // 备用方案：手动维护列表，或者使用 GitHub API
                
                const path = window.location.pathname;
                const basePath = path.endsWith('/') ? path : path.substring(0, path.lastIndexOf('/') + 1);
                
                // 方案1：使用 GitHub API（需要仓库是公开的）
                const repoInfo = getRepoInfo();
                if (repoInfo) {
                    const apiUrl = `https://api.github.com/repos/${repoInfo.owner}/${repoInfo.repo}/contents/${repoInfo.basePath}`;
                    const response = await fetch(apiUrl);
                    
                    if (response.ok) {
                        const data = await response.json();
                        const folders = data.filter(item => 
                            item.type === 'dir' && 
                            !EXCLUDE_FOLDERS.includes(item.name) &&
                            item.name !== '.git'
                        );
                        
                        if (folders.length > 0) {
                            renderTools(folders.map(f => f.name));
                            return;
                        }
                    }
                }
                
                // 方案2：如果API失败或不想用API，使用手动维护的列表
                // 你只需要在这里添加新工具的名称即可
                const manualTools = [
                    'industry-chain',
                    'internet-addiction-website'
                ];
                renderTools(manualTools);
                
            } catch (error) {
                console.error('加载失败:', error);
                // 出错时显示手动列表
                const manualTools = [
                    'industry-chain',
                    'internet-addiction-website'
                ];
                renderTools(manualTools);
            }
        }
        
        function getRepoInfo() {
            // 从当前URL解析GitHub仓库信息
            // URL格式: https://用户名.github.io/仓库名/文件夹/
            const hostname = window.location.hostname;
            const pathname = window.location.pathname;
            
            if (hostname.endsWith('github.io')) {
                const parts = pathname.split('/').filter(p => p);
                const repo = parts[0];
                const basePath = parts.slice(1).join('/');
                return {
                    owner: hostname.replace('.github.io', ''),
                    repo: repo,
                    basePath: basePath
                };
            }
            return null;
        }
        
        function renderTools(folders) {
            const container = document.getElementById('tool-list');
            
            if (!folders || folders.length === 0) {
                container.innerHTML = '<div class="empty">暂无工具，请添加文件夹</div>';
                return;
            }
            
            container.innerHTML = folders.map(folder => `
                <a href="./${folder}/" class="tool-card">
                    <div class="tool-icon">${getToolIcon(folder)}</div>
                    <div class="tool-name">${formatToolName(folder)}</div>
                    <div class="tool-desc">${getToolDescription(folder)}</div>
                </a>
            `).join('');
        }
        
        // 启动
        loadTools();
    </script>
</body>
</html>
