<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产业链图生成器 v2.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .version-badge {
            display: inline-block;
            background: #ffbf99;
            color: #333;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.6em;
            vertical-align: middle;
            margin-left: 10px;
        }
        
        .main-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }
        
        .sidebar {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-height: calc(100vh - 100px);
            overflow-y: auto;
        }
        
        .preview-area {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: auto;
        }
        
        .section-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #61659f;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #61659f;
        }
        
        .tab-buttons {
            display: flex;
            margin-bottom: 20px;
            background: #f0f0f0;
            border-radius: 8px;
            padding: 4px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            background: #61659f;
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            min-height: 200px;
            font-family: inherit;
        }
        
        textarea:focus {
            outline: none;
            border-color: #61659f;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #61659f 0%, #8b5cf6 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(97, 101, 159, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
        }
        
        .btn-info {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
        }
        
        .btn-purple {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            color: white;
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #61659f;
        }
        
        .stream-group {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .stream-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .stream-badge {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            color: white;
        }
        
        .stream-badge.upstream {
            background: #61659f;
        }
        
        .stream-badge.midstream {
            background: #10b981;
        }
        
        .stream-badge.downstream {
            background: #f59e0b;
        }
        
        .industry-item {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 10px;
        }
        
        .industry-item input {
            margin-bottom: 8px;
        }
        
        .products-input {
            font-size: 12px;
        }
        
        .add-btn {
            background: #e0e0e0;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .add-btn:hover {
            background: #d0d0d0;
        }
        
        .remove-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            float: right;
        }
        
        /* 产业链图样式 */
        .chain-diagram {
            min-width: 1200px;
            padding: 30px;
            background: white;
        }
        
        .chain-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            position: relative;
        }
        
        .chain-title-box {
            width: 28%;
            padding: 15px 20px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
            border-radius: 4px;
            background: #61659f;
        }
        
        .header-arrow {
            width: 50px;
            height: 35px;
            flex-shrink: 0;
        }
        
        .chain-subtitle {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .chain-subtitle-box {
            width: 30%;
            padding: 12px 15px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            color: #333;
            background: #99ccc6;
            border-radius: 4px;
        }
        
        .chain-body {
            display: flex;
            justify-content: space-between;
            position: relative;
        }
        
        .chain-section {
            width: 30%;
            position: relative;
        }
        
        .industry-group {
            border: 2px dashed #4a9f94;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .industry-title {
            font-weight: bold;
            font-size: 14px;
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .products-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        
        .product-box {
            padding: 8px 15px;
            background: #d9eddb;
            border-radius: 6px;
            font-size: 13px;
            color: #333;
        }
        
        .product-box.highlight {
            background: #ffbf99;
        }
        
        .key-development {
            margin-top: 15px;
            padding: 12px;
            background: #fff3e6;
            border: 2px solid #ffbf99;
            border-radius: 8px;
        }
        
        .key-development-title {
            font-weight: bold;
            font-size: 12px;
            color: #d97706;
            margin-bottom: 8px;
        }
        
        .key-development-content {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .key-item {
            padding: 6px 12px;
            background: #ffbf99;
            border-radius: 4px;
            font-size: 12px;
            color: #333;
        }
        
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            justify-content: center;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        
        .legend-box {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
        
        .legend-box.highlight {
            background: #ffbf99;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #61659f;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .export-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        
        .export-buttons .btn {
            margin-top: 0;
        }
        
        .api-settings {
            background: #f0f4ff;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .api-settings h4 {
            color: #61659f;
            margin-bottom: 10px;
        }
        
        .placeholder-text {
            color: #999;
            text-align: center;
            padding: 100px 20px;
            font-size: 16px;
        }
        
        .divider {
            border: none;
            border-top: 1px dashed #ccc;
            margin: 20px 0;
        }
        
        .small-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        .export-note {
            background: #f0f4ff;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }
        
        .export-note strong {
            color: #61659f;
        }

        /* 导出纯净模式：仅在导出时隐藏编辑控件 */
        .export-clean-mode [data-action] {
            display: none !important;
        }

        .export-clean-mode .product-box {
            padding-right: 15px !important;
        }

        .export-clean-mode .key-item {
            gap: 0 !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏭 产业链图智能生成器 <span class="version-badge">v2.0</span></h1>
        
        <div class="main-layout">
            <!-- 左侧控制面板 -->
            <div class="sidebar">
                <div class="section-title">📝 输入方式</div>
                
                <div class="tab-buttons">
                    <button class="tab-btn active" onclick="switchTab('ai')">AI智能生成</button>
                    <button class="tab-btn" onclick="switchTab('manual')">手动输入</button>
                </div>
                
                <!-- AI智能生成 -->
                <div id="ai-tab" class="tab-content active">
                    <div class="api-settings">
                        <h4>🔧 API设置</h4>
                        <div class="form-group">
                            <label>API地址</label>
                            <input type="text" id="api-url" value="https://api.siliconflow.cn/v1/chat/completions">
                        </div>
                        <div class="form-group">
                            <label>API密钥</label>
                            <input type="password" id="api-key" value="" placeholder="请输入你的硅基流动 API 密钥">
                        </div>
                        <div class="form-group">
                            <label>模型选择</label>
                            <select id="model-select" style="width:100%;padding:10px;border:2px solid #e0e0e0;border-radius:6px;">
                                <option value="Qwen/Qwen3-8B">Qwen3-8B</option>
                                <option value="deepseek-ai/DeepSeek-V3.2" selected>DeepSeek V3.2</option>
                                <option value="Pro/zai-org/GLM-5">GLM-5</option>
                                <option value="Pro/moonshotai/Kimi-K2.5">Kimi K2.5</option>
                                <option value="deepseek-ai/DeepSeek-R1">DeepSeek-R1</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>产业链名称</label>
                        <input type="text" id="chain-name" placeholder="例如：大健康产业、新能源汽车产业">
                    </div>
                    
                    <div class="form-group">
                        <label>描述信息（可选）</label>
                        <textarea id="ai-input" placeholder="输入产业相关描述，AI将智能分析并生成产业链图。&#10;&#10;例如：&#10;请帮我生成大健康产业链图，上游包括原材料（药品原料、保健品原料）和设备（医疗器械、检测设备），中游包括制造业和服务业，下游包括销售渠道和终端应用。&#10;&#10;重点发展领域：生物医药、智慧医疗、养老服务"></textarea>
                    </div>
                    
                    <button class="btn btn-primary" onclick="generateWithAI()">
                        🤖 AI智能生成
                    </button>
                    
                    <div class="loading" id="loading">
                        <div class="spinner"></div>
                        <p>AI正在分析并生成产业链图...</p>
                    </div>
                </div>
                
                <!-- 手动输入 -->
                <div id="manual-tab" class="tab-content">
                    <div class="form-group">
                        <label>产业链名称</label>
                        <input type="text" id="manual-chain-name" placeholder="例如：大健康产业">
                    </div>
                    
                    <!-- 上游 -->
                    <div class="stream-group">
                        <div class="stream-header">
                            <span class="stream-badge upstream">上游</span>
                            <input type="text" id="upstream-name" placeholder="上游名称" style="flex:1;padding:6px;border:1px solid #ddd;border-radius:4px;">
                        </div>
                        <div class="form-group">
                            <label>功能描述</label>
                            <input type="text" id="upstream-desc" placeholder="例如：基础资源与技术">
                        </div>
                        <div id="upstream-industries"></div>
                        <button class="add-btn" onclick="addIndustry('upstream')">+ 添加细分产业</button>
                        <div class="form-group" style="margin-top:10px;">
                            <label>重点发展（用逗号分隔）</label>
                            <input type="text" id="upstream-key" placeholder="例如：生物医药原料,高端医疗器械">
                        </div>
                    </div>
                    
                    <!-- 中游 -->
                    <div class="stream-group">
                        <div class="stream-header">
                            <span class="stream-badge midstream">中游</span>
                            <input type="text" id="midstream-name" placeholder="中游名称" style="flex:1;padding:6px;border:1px solid #ddd;border-radius:4px;">
                        </div>
                        <div class="form-group">
                            <label>功能描述</label>
                            <input type="text" id="midstream-desc" placeholder="例如：核心产品与服务">
                        </div>
                        <div id="midstream-industries"></div>
                        <button class="add-btn" onclick="addIndustry('midstream')">+ 添加细分产业</button>
                        <div class="form-group" style="margin-top:10px;">
                            <label>重点发展（用逗号分隔）</label>
                            <input type="text" id="midstream-key" placeholder="例如：智慧医疗,健康管理">
                        </div>
                    </div>
                    
                    <!-- 下游 -->
                    <div class="stream-group">
                        <div class="stream-header">
                            <span class="stream-badge downstream">下游</span>
                            <input type="text" id="downstream-name" placeholder="下游名称" style="flex:1;padding:6px;border:1px solid #ddd;border-radius:4px;">
                        </div>
                        <div class="form-group">
                            <label>功能描述</label>
                            <input type="text" id="downstream-desc" placeholder="例如：终端销售与服务应用">
                        </div>
                        <div id="downstream-industries"></div>
                        <button class="add-btn" onclick="addIndustry('downstream')">+ 添加细分产业</button>
                        <div class="form-group" style="margin-top:10px;">
                            <label>重点发展（用逗号分隔）</label>
                            <input type="text" id="downstream-key" placeholder="例如：社区医疗,养老服务">
                        </div>
                    </div>
                    
                    <button class="btn btn-primary" onclick="generateManual()">
                        📊 生成产业链图
                    </button>
                </div>
                
                <hr class="divider">
                
                <div class="section-title">📤 导出选项</div>
                <div class="export-buttons">
                    <button class="btn btn-info" onclick="exportJPG()">导出JPG</button>
                    <button class="btn btn-warning" onclick="exportSVG()">导出SVG</button>
                    <button class="btn btn-purple" onclick="exportWMF()">导出WMF</button>
                </div>
                <div class="export-note">
                    <strong>格式说明：</strong><br>
                    • JPG - 高清图片，适合直接使用<br>
                    • SVG - 矢量图，可导入Visio编辑<br>
                    • WMF - Windows矢量图，Office/Visio原生支持
                </div>
            </div>
            
            <!-- 右侧预览区 -->
            <div class="preview-area">
                <div class="section-title">👁️ 预览</div>
                <div id="preview-container">
                    <div class="placeholder-text">
                        请在左侧输入产业链信息，<br>生成后将在此处显示预览
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 全局数据
        let chainData = null;
        let industryCounters = {
            upstream: 0,
            midstream: 0,
            downstream: 0
        };
        
        // 切换标签页
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
        }
        
        // 添加细分产业
        function addIndustry(stream) {
            const container = document.getElementById(stream + '-industries');
            const index = industryCounters[stream]++;
            
            const html = `
                <div class="industry-item" id="${stream}-industry-${index}">
                    <button class="remove-btn" onclick="removeIndustry('${stream}', ${index})">删除</button>
                    <div class="form-group">
                        <label>细分产业名称</label>
                        <input type="text" class="industry-name" placeholder="例如：原材料">
                    </div>
                    <div class="form-group">
                        <label>产品列表（用逗号分隔）</label>
                        <input type="text" class="products-input" placeholder="例如：药品原料,保健品原料,医用材料">
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
        }
        
        // 删除细分产业
        function removeIndustry(stream, index) {
            const element = document.getElementById(`${stream}-industry-${index}`);
            if (element) element.remove();
        }
        
        // AI智能生成
        async function generateWithAI() {
            const chainName = document.getElementById('chain-name').value.trim();
            const description = document.getElementById('ai-input').value.trim();
            const apiUrl = document.getElementById('api-url').value.trim();
            const apiKey = document.getElementById('api-key').value.trim();
            const model = document.getElementById('model-select').value;
            
            if (!chainName) {
                alert('请输入产业链名称');
                return;
            }
            
            if (!apiKey) {
                alert('请先填写硅基流动 API 密钥');
                return;
            }
            
            const loading = document.getElementById('loading');
            loading.classList.add('show');
            
            const prompt = `你是一个产业链分析专家。请根据以下信息生成一个完整的产业链结构数据。

产业链名称：${chainName}
${description ? '补充描述：' + description : ''}

请严格按照以下JSON格式返回数据，不要返回任何其他内容：
{
    "chainName": "产业链名称",
    "upstream": {
        "name": "上游",
        "description": "基础资源与技术",
        "industries": [
            {
                "name": "细分产业1名称",
                "products": ["产品1", "产品2", "产品3"]
            },
            {
                "name": "细分产业2名称",
                "products": ["产品1", "产品2"]
            }
        ],
        "keyDevelopment": ["重点发展项目1", "重点发展项目2"]
    },
    "midstream": {
        "name": "中游",
        "description": "核心产品与服务",
        "industries": [
            {
                "name": "细分产业1名称",
                "products": ["产品1", "产品2", "产品3"]
            }
        ],
        "keyDevelopment": ["重点发展项目1", "重点发展项目2"]
    },
    "downstream": {
        "name": "下游",
        "description": "终端销售与服务应用",
        "industries": [
            {
                "name": "细分产业1名称",
                "products": ["产品1", "产品2"]
            }
        ],
        "keyDevelopment": ["重点发展项目1", "重点发展项目2"]
    }
}

要求：
1. 每个层级至少包含2-4个细分产业
2. 每个细分产业包含2-5个具体产品
3. 每个层级包含2-4个重点发展项目
4. 内容要专业、准确、符合实际产业情况
5. 只返回JSON数据，不要有任何解释文字`;

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: [
                            {
                                role: 'user',
                                content: prompt
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 4096
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`API请求失败: ${response.status}`);
                }
                
                const data = await response.json();
                let content = data.choices[0].message.content;
                
                // 提取JSON
                const jsonMatch = content.match(/\{[\s\S]*\}/);
                if (jsonMatch) {
                    chainData = JSON.parse(jsonMatch[0]);
                    refreshDiagram();
                } else {
                    throw new Error('无法解析AI返回的数据');
                }
                
            } catch (error) {
                alert('生成失败：' + error.message);
                console.error(error);
            } finally {
                loading.classList.remove('show');
            }
        }
        
        // 手动生成
        function generateManual() {
            const chainName = document.getElementById('manual-chain-name').value.trim() || '产业链';
            
            chainData = {
                chainName: chainName,
                upstream: collectStreamData('upstream'),
                midstream: collectStreamData('midstream'),
                downstream: collectStreamData('downstream')
            };
            
            refreshDiagram();
        }
        
        // 收集流数据
        function collectStreamData(stream) {
            const name = document.getElementById(`${stream}-name`).value.trim() || 
                        (stream === 'upstream' ? '上游' : stream === 'midstream' ? '中游' : '下游');
            const desc = document.getElementById(`${stream}-desc`).value.trim() || 
                        (stream === 'upstream' ? '基础资源与技术' : stream === 'midstream' ? '核心产品与服务' : '终端销售与服务应用');
            const keyDev = document.getElementById(`${stream}-key`).value.trim();
            
            const industries = [];
            const container = document.getElementById(`${stream}-industries`);
            container.querySelectorAll('.industry-item').forEach(item => {
                const industryName = item.querySelector('.industry-name').value.trim();
                const products = item.querySelector('.products-input').value.trim()
                    .split(/[,，]/)
                    .map(p => p.trim())
                    .filter(p => p);
                
                if (industryName || products.length > 0) {
                    industries.push({
                        name: industryName || '细分产业',
                        products: products.length > 0 ? products : ['产品1']
                    });
                }
            });
            
            return {
                name: name,
                description: desc,
                industries: industries.length > 0 ? industries : [{ name: '细分产业', products: ['产品1', '产品2'] }],
                keyDevelopment: keyDev ? keyDev.split(/[,，]/).map(k => k.trim()).filter(k => k) : []
            };
        }

        // 原位内联编辑器
        let activeInlineEditor = null;
        let activeInlineAdderCleanup = null;

        function clearInlineAdder() {
            if (typeof activeInlineAdderCleanup === 'function') {
                activeInlineAdderCleanup();
            }
            activeInlineAdderCleanup = null;
        }

        function openInlineEditor(anchorEl, initialValue, onSave) {
            clearInlineAdder();
            if (activeInlineEditor && activeInlineEditor.parentNode) {
                activeInlineEditor.parentNode.removeChild(activeInlineEditor);
                activeInlineEditor = null;
            }

            const rect = anchorEl.getBoundingClientRect();
            const input = document.createElement('input');
            input.type = 'text';
            input.value = initialValue || '';
            input.style.position = 'fixed';
            input.style.left = rect.left + 'px';
            input.style.top = rect.top + 'px';
            input.style.width = Math.max(rect.width, 120) + 'px';
            input.style.height = Math.max(rect.height, 28) + 'px';
            input.style.padding = '4px 8px';
            input.style.border = '2px solid #61659f';
            input.style.borderRadius = '6px';
            input.style.background = '#ffffff';
            input.style.color = '#333333';
            input.style.fontSize = '14px';
            input.style.zIndex = '9999';
            input.style.boxShadow = '0 4px 12px rgba(0,0,0,0.15)';

            const closeEditor = () => {
                if (input.parentNode) {
                    input.parentNode.removeChild(input);
                }
                if (activeInlineEditor === input) {
                    activeInlineEditor = null;
                }
            };

            const commit = () => {
                const newValue = input.value.trim();
                closeEditor();
                if (!newValue) return;
                if (newValue === (initialValue || '').trim()) return;
                onSave(newValue);
            };

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    commit();
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    closeEditor();
                }
            });

            input.addEventListener('blur', commit);

            document.body.appendChild(input);
            activeInlineEditor = input;
            input.focus();
            input.select();
        }

        function createInlineChipAdder(hostEl, placeholder, onCommit) {
            clearInlineAdder();

            const draft = document.createElement('div');
            draft.className = hostEl.classList.contains('key-development-content') ? 'key-item' : 'product-box';
            draft.style.display = 'inline-flex';
            draft.style.alignItems = 'center';
            draft.style.padding = '4px 8px';

            const input = document.createElement('input');
            input.type = 'text';
            input.placeholder = placeholder;
            input.style.border = '1px solid #b6c0d9';
            input.style.borderRadius = '4px';
            input.style.padding = '3px 6px';
            input.style.minWidth = '90px';
            input.style.fontSize = '12px';
            input.style.outline = 'none';

            draft.appendChild(input);
            hostEl.appendChild(draft);

            let finished = false;
            const cleanup = () => {
                if (finished) return;
                finished = true;
                if (draft.parentNode) draft.parentNode.removeChild(draft);
            };

            const commit = () => {
                if (finished) return;
                const value = input.value.trim();
                if (value) {
                    finished = true;
                    if (draft.parentNode) draft.parentNode.removeChild(draft);
                    if (activeInlineAdderCleanup === cleanup) {
                        activeInlineAdderCleanup = null;
                    }
                    onCommit(value);
                } else {
                    cleanup();
                }
            };

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    commit();
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    cleanup();
                }
            });

            input.addEventListener('blur', commit);

            activeInlineAdderCleanup = cleanup;
            input.focus();
        }

        function createInlineIndustryAdder(stream, triggerBtn) {
            clearInlineAdder();

            const section = triggerBtn.closest('.chain-section');
            if (!section) return;

            const draft = document.createElement('div');
            draft.className = 'industry-group';
            draft.style.position = 'relative';
            draft.innerHTML = `
                <div class="industry-title" style="margin-bottom:8px;">
                    <input type="text" data-role="industry-name" placeholder="产业组名称" style="width:100%;padding:6px 8px;border:1px solid #b6c0d9;border-radius:4px;font-size:13px;">
                </div>
                <div style="margin-bottom:8px;">
                    <input type="text" data-role="industry-products" placeholder="产品列表（逗号分隔）" style="width:100%;padding:6px 8px;border:1px solid #b6c0d9;border-radius:4px;font-size:12px;">
                </div>
                <div style="display:flex;gap:8px;justify-content:flex-end;">
                    <button class="add-btn" data-role="save-industry">保存</button>
                    <button class="remove-btn" data-role="cancel-industry" style="float:none;">取消</button>
                </div>
            `;

            section.insertBefore(draft, triggerBtn);

            const nameInput = draft.querySelector('[data-role="industry-name"]');
            const productsInput = draft.querySelector('[data-role="industry-products"]');
            const saveBtn = draft.querySelector('[data-role="save-industry"]');
            const cancelBtn = draft.querySelector('[data-role="cancel-industry"]');

            let finished = false;
            const cleanup = () => {
                if (finished) return;
                finished = true;
                if (draft.parentNode) draft.parentNode.removeChild(draft);
            };

            const save = () => {
                if (finished) return;
                const name = nameInput.value.trim();
                if (!name) {
                    nameInput.focus();
                    return;
                }
                const products = productsInput.value
                    .split(/[,，]/)
                    .map(p => p.trim())
                    .filter(Boolean);

                chainData[stream].industries.push({
                    name: name,
                    products: products.length ? products : ['产品']
                });
                refreshDiagram();
            };

            saveBtn.addEventListener('click', save);
            cancelBtn.addEventListener('click', cleanup);

            [nameInput, productsInput].forEach(input => {
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        save();
                    } else if (e.key === 'Escape') {
                        e.preventDefault();
                        cleanup();
                    }
                });
            });

            activeInlineAdderCleanup = cleanup;
            nameInput.focus();
        }

        // 预览区编辑事件委托（增删改）
        function bindPreviewEvents() {
            const preview = document.getElementById('preview-container');

            preview.addEventListener('click', function(e) {
                if (!chainData) return;

                const actionTarget = e.target.closest('[data-action]');
                if (!actionTarget) return;

                const action = actionTarget.getAttribute('data-action');
                const stream = actionTarget.getAttribute('data-stream');
                const industryIndex = Number(actionTarget.getAttribute('data-industry-index'));
                const productIndex = Number(actionTarget.getAttribute('data-product-index'));
                const keyIndex = Number(actionTarget.getAttribute('data-key-index'));

                if (action === 'remove-industry') {
                    chainData[stream].industries.splice(industryIndex, 1);
                    refreshDiagram();
                    return;
                }

                if (action === 'remove-product') {
                    chainData[stream].industries[industryIndex].products.splice(productIndex, 1);
                    refreshDiagram();
                    return;
                }

                if (action === 'remove-key') {
                    chainData[stream].keyDevelopment.splice(keyIndex, 1);
                    refreshDiagram();
                    return;
                }

                if (action === 'remove-key-section') {
                    chainData[stream].showKeyDevelopment = false;
                    chainData[stream].keyDevelopment = [];
                    refreshDiagram();
                    return;
                }

                if (action === 'add-key-section') {
                    chainData[stream].showKeyDevelopment = true;
                    if (!Array.isArray(chainData[stream].keyDevelopment)) {
                        chainData[stream].keyDevelopment = [];
                    }
                    refreshDiagram();
                    return;
                }

                if (action === 'add-industry') {
                    createInlineIndustryAdder(stream, actionTarget);
                    return;
                }

                if (action === 'add-product') {
                    const group = actionTarget.closest('.industry-group');
                    if (!group) return;
                    const grid = group.querySelector('.products-grid');
                    if (!grid) return;

                    createInlineChipAdder(grid, '产品名称', function(productName) {
                        chainData[stream].industries[industryIndex].products.push(productName);
                        refreshDiagram();
                    });
                    return;
                }

                if (action === 'add-key') {
                    const keyDev = actionTarget.closest('.key-development');
                    if (!keyDev) return;
                    const content = keyDev.querySelector('.key-development-content');
                    if (!content) return;

                    createInlineChipAdder(content, '重点发展项', function(keyName) {
                        if (!Array.isArray(chainData[stream].keyDevelopment)) {
                            chainData[stream].keyDevelopment = [];
                        }
                        chainData[stream].keyDevelopment.push(keyName);
                        refreshDiagram();
                    });
                }
            });

            preview.addEventListener('dblclick', function(e) {
                if (!chainData) return;
                if (e.target.closest('[data-action]')) return;

                const editTarget = e.target.closest('[data-edit-type]');
                if (!editTarget) return;

                e.preventDefault();

                const editType = editTarget.getAttribute('data-edit-type');
                const stream = editTarget.getAttribute('data-stream');
                const industryIndex = Number(editTarget.getAttribute('data-industry-index'));
                const productIndex = Number(editTarget.getAttribute('data-product-index'));
                const keyIndex = Number(editTarget.getAttribute('data-key-index'));

                let currentValue = '';

                if (editType === 'stream-name') {
                    currentValue = chainData[stream].name;
                } else if (editType === 'stream-description') {
                    currentValue = chainData[stream].description;
                } else if (editType === 'industry-name') {
                    currentValue = chainData[stream].industries[industryIndex].name;
                } else if (editType === 'product-name') {
                    currentValue = chainData[stream].industries[industryIndex].products[productIndex];
                } else if (editType === 'key-item') {
                    currentValue = chainData[stream].keyDevelopment[keyIndex];
                }

                openInlineEditor(editTarget, currentValue, function(newValue) {
                    if (editType === 'stream-name') {
                        chainData[stream].name = newValue;
                    } else if (editType === 'stream-description') {
                        chainData[stream].description = newValue;
                    } else if (editType === 'industry-name') {
                        chainData[stream].industries[industryIndex].name = newValue;
                    } else if (editType === 'product-name') {
                        chainData[stream].industries[industryIndex].products[productIndex] = newValue;
                    } else if (editType === 'key-item') {
                        chainData[stream].keyDevelopment[keyIndex] = newValue;
                    }

                    refreshDiagram();
                });
            });
        }
        
        // 导出JPG
        async function exportJPG() {
            if (!chainData) {
                alert('请先生成产业链图');
                return;
            }
            
            const diagram = document.getElementById('chain-diagram');
            if (!diagram) {
                alert('请先生成产业链图');
                return;
            }

            const setExportMode = (enabled) => {
                diagram.classList.toggle('export-clean-mode', enabled);
            };
            
            try {
                setExportMode(true);
                // 等待样式生效后再截图，确保导出不包含编辑按钮
                await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));

                // 使用html2canvas生成图片
                const canvas = await html2canvas(diagram, {
                    scale: 2, // 2倍清晰度
                    backgroundColor: '#ffffff',
                    useCORS: true,
                    logging: false
                });
                
                // 转换为JPG并下载
                const link = document.createElement('a');
                link.download = chainData.chainName + '产业链图.jpg';
                link.href = canvas.toDataURL('image/jpeg', 0.95);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
            } catch (error) {
                console.error('JPG导出错误:', error);
                alert('JPG导出失败: ' + error.message);
            } finally {
                setExportMode(false);
            }
        }

                // 副标题框
                svg += `    <rect x="${x}" y="120" width="${colWidth}" height="30" fill="#99ccc6" rx="4" ry="4"/>
    <text x="${x + colWidth/2}" y="140" text-anchor="middle" class="subtitle-text" fill="#333333">${stream.description}</text>
`;
            });
            
            // 箭头（放在标题框之间）
            const arrowY = 75;
            svg += `    <!-- 箭头1 -->
    <polygon points="${arrowX1},${arrowY+15} ${arrowX1+35},${arrowY+15} ${arrowX1+35},${arrowY+5} ${arrowX1+55},${arrowY+20} ${arrowX1+35},${arrowY+35} ${arrowX1+35},${arrowY+25} ${arrowX1},${arrowY+25}" fill="#99ccc6"/>
    <!-- 箭头2 -->
    <polygon points="${arrowX2},${arrowY+15} ${arrowX2+35},${arrowY+15} ${arrowX2+35},${arrowY+5} ${arrowX2+55},${arrowY+20} ${arrowX2+35},${arrowY+35} ${arrowX2+35},${arrowY+25} ${arrowX2},${arrowY+25}" fill="#99ccc6"/>
`;
            
            // 绘制细分产业
            streams.forEach((stream, i) => {
                const x = cols[i];
                let yPos = 170;
                
                stream.industries.forEach(ind => {
                    // 虚线边框
                    svg += `    <rect x="${x}" y="${yPos}" width="${colWidth}" height="80" fill="#ffffff" stroke="#4a9f94" stroke-width="2" stroke-dasharray="5,5" rx="6" ry="6"/>
`;
                    // 产业名称
                    svg += `    <text x="${x + colWidth/2}" y="${yPos + 20}" text-anchor="middle" class="industry-title" fill="#333333">${ind.name}</text>
`;
                    // 产品
                    const productY = yPos + 40;
                    const maxPerRow = 3;
                    const productBoxWidth = (colWidth - 40) / maxPerRow;
                    
                    ind.products.slice(0, 6).forEach((prod, pi) => {
                        const row = Math.floor(pi / maxPerRow);
                        const col = pi % maxPerRow;
                        const px = x + 10 + col * (productBoxWidth + 5);
                        const py = productY + row * 25;
                        svg += `    <rect x="${px}" y="${py}" width="${productBoxWidth}" height="20" fill="#d9eddb" rx="4" ry="4"/>
    <text x="${px + productBoxWidth/2}" y="${py + 14}" text-anchor="middle" class="product-text" fill="#333333">${prod}</text>
`;
                    });
                    yPos += 95;
                });
                
                // 重点发展
                if (stream.keyDevelopment && stream.keyDevelopment.length > 0) {
                    svg += `    <rect x="${x}" y="${yPos}" width="${colWidth}" height="45" fill="#fff3e6" stroke="#ffbf99" stroke-width="2" rx="6" ry="6"/>
    <text x="${x + 10}" y="${yPos + 16}" class="key-text" fill="#d97706">★ 重点发展</text>
`;
                    const keyText = stream.keyDevelopment.join(' | ');
                    svg += `    <text x="${x + colWidth/2}" y="${yPos + 34}" text-anchor="middle" class="product-text" fill="#333333">${keyText}</text>
`;
                }
            });
            
            svg += `</svg>`;
            
            // 下载SVG
            const blob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = chainData.chainName + '产业链图.svg';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        // 导出WMF（通过EMF格式，Office/Visio原生支持）
        function exportWMF() {
            if (!chainData) {
                alert('请先生成产业链图');
                return;
            }
            
            // WMF是Windows专有格式，浏览器无法直接生成
            // 最佳方案：生成高质量SVG，用户可在Visio中打开后另存为WMF
            // 或者生成EMF兼容的SVG格式
            
            const width = 1200;
            const height = 800;
            const colWidth = 320;
            const cols = [50, 440, 830];
            const arrowX1 = 380;
            const arrowX2 = 770;
            
            // 生成EMF兼容的SVG（简化版，去除复杂样式）
            let svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
    <!-- 背景 -->
    <rect x="0" y="0" width="${width}" height="${height}" fill="white"/>
    
    <!-- 标题 -->
    <text x="${width/2}" y="40" text-anchor="middle" font-family="Microsoft YaHei" font-size="24" font-weight="bold" fill="#61659f">${chainData.chainName}产业链图</text>
`;
            
            const streams = [chainData.upstream, chainData.midstream, chainData.downstream];
            
            // 绘制标题框
            streams.forEach((stream, i) => {
                const x = cols[i];
                
                svg += `    <rect x="${x}" y="70" width="${colWidth}" height="40" fill="#61659f"/>
    <text x="${x + colWidth/2}" y="96" text-anchor="middle" font-family="Microsoft YaHei" font-size="16" font-weight="bold" fill="white">${stream.name}</text>
    <rect x="${x}" y="120" width="${colWidth}" height="30" fill="#99ccc6"/>
    <text x="${x + colWidth/2}" y="140" text-anchor="middle" font-family="Microsoft YaHei" font-size="12" fill="#333333">${stream.description}</text>
`;
            });
            
            // 箭头
            const arrowY = 75;
            svg += `    <polygon points="${arrowX1},${arrowY+15} ${arrowX1+35},${arrowY+15} ${arrowX1+35},${arrowY+5} ${arrowX1+55},${arrowY+20} ${arrowX1+35},${arrowY+35} ${arrowX1+35},${arrowY+25} ${arrowX1},${arrowY+25}" fill="#99ccc6"/>
    <polygon points="${arrowX2},${arrowY+15} ${arrowX2+35},${arrowY+15} ${arrowX2+35},${arrowY+5} ${arrowX2+55},${arrowY+20} ${arrowX2+35},${arrowY+35} ${arrowX2+35},${arrowY+25} ${arrowX2},${arrowY+25}" fill="#99ccc6"/>
`;
            
            // 细分产业
            streams.forEach((stream, i) => {
                const x = cols[i];
                let yPos = 170;
                
                stream.industries.forEach(ind => {
                    svg += `    <rect x="${x}" y="${yPos}" width="${colWidth}" height="80" fill="white" stroke="#4a9f94" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="${x + colWidth/2}" y="${yPos + 20}" text-anchor="middle" font-family="Microsoft YaHei" font-size="12" font-weight="bold" fill="#333333">${ind.name}</text>
`;
                    const productY = yPos + 40;
                    const maxPerRow = 3;
                    const productBoxWidth = (colWidth - 40) / maxPerRow;
                    
                    ind.products.slice(0, 6).forEach((prod, pi) => {
                        const row = Math.floor(pi / maxPerRow);
                        const col = pi % maxPerRow;
                        const px = x + 10 + col * (productBoxWidth + 5);
                        const py = productY + row * 25;
                        svg += `    <rect x="${px}" y="${py}" width="${productBoxWidth}" height="20" fill="#d9eddb"/>
    <text x="${px + productBoxWidth/2}" y="${py + 14}" text-anchor="middle" font-family="Microsoft YaHei" font-size="10" fill="#333333">${prod}</text>
`;
                    });
                    yPos += 95;
                });
                
                if (stream.keyDevelopment && stream.keyDevelopment.length > 0) {
                    svg += `    <rect x="${x}" y="${yPos}" width="${colWidth}" height="45" fill="#fff3e6" stroke="#ffbf99" stroke-width="2"/>
    <text x="${x + 10}" y="${yPos + 16}" font-family="Microsoft YaHei" font-size="10" fill="#d97706">★ 重点发展</text>
    <text x="${x + colWidth/2}" y="${yPos + 34}" text-anchor="middle" font-family="Microsoft YaHei" font-size="10" fill="#333333">${stream.keyDevelopment.join(' | ')}</text>
`;
                }
            });
            
            svg += `</svg>`;
            
            // 下载为.wmf.svg格式，提示用户在Visio中转换
            const blob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = chainData.chainName + '产业链图_WMF兼容.svg';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            // 提示用户
            setTimeout(() => {
                alert('已导出WMF兼容的SVG文件！\n\n转换为WMF格式的方法：\n1. 用Visio打开此SVG文件\n2. 选择"文件" → "另存为"\n3. 保存类型选择"Windows图元文件(*.wmf)"\n\n或者：\n1. 用Inkscape打开此SVG\n2. 导出为WMF/EMF格式');
            }, 500);
        }
        
        // 初始化：添加默认的细分产业输入框
        document.addEventListener('DOMContentLoaded', function() {
            addIndustry('upstream');
            addIndustry('midstream');
            addIndustry('downstream');
            bindPreviewEvents();
        });
    </script>
</body>
